name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which part of Git Vertex is affected?
      options:
        - Desktop app
        - VS Code extension
        - Terminal UI (CLI)
        - MCP server
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.5 / Windows 11 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Open a repo with …
        2. Click …
        3. Expected … but got …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Anything that helps reproduce or diagnose (optional).
