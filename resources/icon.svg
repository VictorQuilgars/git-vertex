<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0d1117"/>

  <!-- Branch line - main (vertical) -->
  <line x1="180" y1="100" x2="180" y2="412" stroke="#3fb950" stroke-width="18" stroke-linecap="round"/>

  <!-- Branch line - feature (diagonal then vertical) -->
  <path d="M180 180 Q180 270 310 270 L310 340" fill="none" stroke="#58a6ff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Merge line back -->
  <path d="M310 340 Q310 412 180 412" fill="none" stroke="#58a6ff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Commit nodes - main branch -->
  <circle cx="180" cy="130" r="22" fill="#0d1117" stroke="#3fb950" stroke-width="14"/>
  <circle cx="180" cy="260" r="22" fill="#0d1117" stroke="#3fb950" stroke-width="14"/>
  <circle cx="180" cy="412" r="22" fill="#3fb950" stroke="#3fb950" stroke-width="4"/>

  <!-- Commit nodes - feature branch -->
  <circle cx="310" cy="270" r="22" fill="#0d1117" stroke="#58a6ff" stroke-width="14"/>
  <circle cx="310" cy="340" r="22" fill="#0d1117" stroke="#58a6ff" stroke-width="14"/>
</svg>
